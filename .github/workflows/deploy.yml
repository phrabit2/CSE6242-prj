# ============================================================
# CSE6242 Baseball CPD Dashboard — CI/CD Deploy Workflow
# ============================================================
# This workflow runs automatically on push to main:
#   1) Deploy latest code to EC2 + restart server
#   2) Sync project data to S3 bucket
#   3) Report deployment result
# ============================================================

name: Deploy to EC2 & Sync S3

on:
  push:
    branches:
      - main

# ──────────────────────────────
# Environment variables (shared)
# ──────────────────────────────
env:
  EC2_PROJECT_DIR: /home/ubuntu/project/repo   # Project clone path on EC2
  EC2_VENV_DIR: /home/ubuntu/project/venv      # Python venv path on EC2
  S3_BUCKET: s3://team26-cpd-data-294342039761
  AWS_REGION: ap-northeast-2

jobs:
  # ════════════════════════════
  # Job 1: Deploy to EC2
  # ════════════════════════════
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -e
            echo "=========================================="
            echo "🚀 EC2 deployment started: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # ── 1. Pull latest code ──
            cd ${{ env.EC2_PROJECT_DIR }}
            echo "📦 Git pull (main)..."
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated: $(git log --oneline -1)"

            # ── 2. Install Python dependencies ──
            echo "📦 Installing packages..."
            source ${{ env.EC2_VENV_DIR }}/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            echo "✅ Package installation complete"

            # ── 3. Restart server ──
            # Uncomment the section matching your framework.

            # --- Dash (current project default) ---
            pkill -f "python.*dashboard/app.py" || true
            sleep 2
            setsid ${{ env.EC2_VENV_DIR }}/bin/python -m dashboard.app > /tmp/dashboard.log 2>&1 < /dev/null &
            sleep 3
            echo "✅ Dash server restarted"

            # --- Django ---
            # pkill -f "gunicorn" || true
            # sleep 2
            # cd ${{ env.EC2_PROJECT_DIR }}
            # nohup ${{ env.EC2_VENV_DIR }}/bin/gunicorn myproject.wsgi:application \
            #   --bind 0.0.0.0:8000 --workers 3 --daemon \
            #   --access-logfile /tmp/gunicorn-access.log \
            #   --error-logfile /tmp/gunicorn-error.log

            # --- Flask ---
            # pkill -f "gunicorn.*app:app" || true
            # sleep 2
            # nohup ${{ env.EC2_VENV_DIR }}/bin/gunicorn app:app \
            #   --bind 0.0.0.0:5000 --workers 3 --daemon \
            #   --access-logfile /tmp/flask-access.log \
            #   --error-logfile /tmp/flask-error.log

            # --- Streamlit ---
            # pkill -f "streamlit run" || true
            # sleep 2
            # nohup ${{ env.EC2_VENV_DIR }}/bin/streamlit run app.py \
            #   --server.port 8501 --server.headless true \
            #   > /tmp/streamlit.log 2>&1 &

            echo "=========================================="
            echo "🎉 EC2 deployment complete: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

  # ════════════════════════════
  # Job 2: Sync data to S3
  # ════════════════════════════
  sync-s3:
    name: Sync Data to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync data/raw/ to S3
        run: |
          echo "📤 Syncing data/raw/ → S3..."
          aws s3 sync data/raw/ ${{ env.S3_BUCKET }}/data/raw/ \
            --exclude "*.py" \
            --exclude "__pycache__/*" \
            --exclude "*.md" \
            --exclude "*.pyc" \
            --exclude ".gitkeep" \
            --delete
          echo "✅ data/raw/ sync complete"

      - name: Sync data/processed/ to S3
        run: |
          echo "📤 Syncing data/processed/ → S3..."
          aws s3 sync data/processed/ ${{ env.S3_BUCKET }}/data/processed/ \
            --exclude "*.py" \
            --exclude "__pycache__/*" \
            --exclude "*.md" \
            --exclude "*.pyc" \
            --exclude ".gitkeep" \
            --delete
          echo "✅ data/processed/ sync complete"

      - name: Verify S3 sync
        run: |
          echo "📋 S3 bucket data listing:"
          aws s3 ls ${{ env.S3_BUCKET }}/data/ --recursive --human-readable --summarize || echo "ℹ️ No data files synced yet (data directories may be empty)"

  # ════════════════════════════
  # Job 3: Deployment notification
  # ════════════════════════════
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy-ec2, sync-s3]
    if: always()

    steps:
      - name: Determine deployment status
        id: status
        run: |
          EC2_RESULT="${{ needs.deploy-ec2.result }}"
          S3_RESULT="${{ needs.sync-s3.result }}"

          echo "ec2_result=${EC2_RESULT}" >> "$GITHUB_OUTPUT"
          echo "s3_result=${S3_RESULT}" >> "$GITHUB_OUTPUT"

          if [[ "$EC2_RESULT" == "success" && "$S3_RESULT" == "success" ]]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
          else
            echo "overall=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Print deployment summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║     📊 Deployment Summary                ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Workflow:  ${{ github.workflow }}"
          echo "║ Trigger:   ${{ github.event_name }}"
          echo "║ Branch:    ${{ github.ref_name }}"
          echo "║ Commit:    ${{ github.sha }}"
          echo "║ Actor:     ${{ github.actor }}"
          echo "╠══════════════════════════════════════════╣"
          echo "║ EC2 Deploy:  ${{ steps.status.outputs.ec2_result }}"
          echo "║ S3 Sync:     ${{ steps.status.outputs.s3_result }}"
          echo "╠══════════════════════════════════════════╣"
          echo "║ Overall:     ${{ steps.status.outputs.overall }}"
          echo "╚══════════════════════════════════════════╝"

      - name: Fail workflow if any job failed
        if: steps.status.outputs.overall == 'failure'
        run: |
          echo "❌ Deployment failed! Check the logs above."
          exit 1
